<!DOCTYPE html>
<html lang="de" suppressHydrationWarning>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Tube — YouTube Ad Script Generator</title>
  <style>
    :root {
      --bg: #111111;
      --bg-card: #1a1a1a;
      --bg-card-hover: #252525;
      --bg-input: #141414;
      --border: #2a2a2a;
      --border-focus: #ef4444;
      --text: #e4e4e7;
      --text-dim: #71717a;
      --text-bright: #fafafa;
      --accent: #ef4444;
      --accent-hover: #f87171;
      --accent-dim: rgba(239, 68, 68, 0.15);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --amber: #f59e0b;
      --amber-dim: rgba(245, 158, 11, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --scientist: #06b6d4;
      --scientist-dim: rgba(6, 182, 212, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 3px;
      height: 100vh;
      background: var(--accent);
      z-index: 200;
    }

    /* Layout */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top Navbar */
    .navbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 100;
    }

    .main {
      margin-top: 56px;
      flex: 1;
      padding: 32px 48px 80px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      height: calc(100vh - 56px);
      overflow-y: auto;
      width: 100%;
    }

    /* Navbar */
    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-bright);
      padding: 0 8px 0 0;
      margin-right: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .logo-icon {
      font-size: 22px;
    }

    .logo-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .logo-sub {
      font-size: 9px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-item {
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--bg-card-hover);
      color: var(--text-bright);
      font-weight: 600;
    }

    .nav-icon {
      font-size: 14px;
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-status {
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--text-dim);
    }

    .lang-toggle {
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      background: transparent;
      border: 1px solid var(--border);
      font-family: inherit;
    }

    .lang-toggle:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .api-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .api-dot.connected {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .api-dot.disconnected {
      background: var(--red);
    }

    /* Page header */
    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      font-size: 16px;
    }

    /* Form elements */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--border-focus);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    select {
      cursor: pointer;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Thinker chips */
    .thinker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .thinker-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      transition: all 0.15s;
      user-select: none;
    }

    .thinker-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .thinker-chip.selected {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .thinker-chip.required {
      background: var(--scientist-dim);
      border-color: var(--scientist);
      color: var(--scientist);
      cursor: default;
    }

    .thinker-chip .chip-role {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: 4px;
    }

    /* Framework chips */
    .framework-chip {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .framework-chip:hover {
      border-color: var(--accent);
    }

    .framework-chip.selected {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .framework-stars {
      font-size: 10px;
    }

    /* Output */
    .output-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: visible;
    }

    .output-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-tabs {
      display: flex;
      gap: 4px;
    }

    .output-tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.15s;
      background: transparent;
      border: none;
      font-family: inherit;
    }

    .output-tab:hover {
      color: var(--text);
    }

    .output-tab.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .output-body {
      padding: 24px;
      font-size: 14px;
      line-height: 1.8;
    }

    .output-body h1 {
      font-size: 20px;
      color: var(--text-bright);
      margin: 24px 0 12px;
    }

    .output-body h2 {
      font-size: 16px;
      color: var(--accent);
      margin: 20px 0 10px;
    }

    .output-body h3 {
      font-size: 14px;
      color: var(--text-bright);
      margin: 16px 0 8px;
    }

    .output-body p {
      margin-bottom: 12px;
    }

    .output-body strong {
      color: var(--text-bright);
    }

    .output-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .script-section {
      border-left: 3px solid var(--accent);
      padding: 16px 20px;
      margin: 16px 0;
      background: var(--accent-dim);
      border-radius: 0 8px 8px 0;
    }

    .script-section.hook {
      border-left-color: var(--red);
      background: var(--red-dim);
    }

    .script-section.engage {
      border-left-color: var(--amber);
      background: var(--amber-dim);
    }

    .script-section.mechanism {
      border-left-color: var(--accent);
      background: var(--accent-dim);
    }

    .script-section.proof {
      border-left-color: var(--green);
      background: var(--green-dim);
    }

    .script-section.cta {
      border-left-color: var(--scientist);
      background: var(--scientist-dim);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .script-section.hook .section-label {
      color: var(--red);
    }

    .script-section.engage .section-label {
      color: var(--amber);
    }

    .script-section.mechanism .section-label {
      color: var(--accent);
    }

    .script-section.proof .section-label {
      color: var(--green);
    }

    .script-section.cta .section-label {
      color: var(--scientist);
    }

    .visual-note {
      color: var(--text-dim);
      font-style: italic;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .audio-line {
      font-weight: 500;
      color: var(--text-bright);
      font-size: 15px;
    }

    .reasoning {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Streaming animation */
    .streaming-cursor::after {
      content: '▊';
      animation: blink 0.8s infinite;
      color: var(--accent);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* Loading */
    .generating {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .generating-text {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
    }

    .generating-phase {
      font-size: 14px;
      color: var(--accent);
      font-weight: 600;
    }

    /* Archive */
    .archive-item {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .archive-item:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .archive-title {
      font-size: 14px;
      font-weight: 500;
    }

    .archive-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Settings */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting-label {
      font-size: 14px;
    }

    .setting-desc {
      font-size: 12px;
      color: var(--text-dim);
    }

    .api-input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-input {
      width: 300px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'SF Mono', monospace;
      outline: none;
    }

    .api-input:focus {
      border-color: var(--border-focus);
    }

    /* Debate panel */
    .debate-message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .debate-speaker {
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 4px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .navbar {
        padding: 0 12px;
        gap: 4px;
      }

      .nav-item {
        padding: 6px 8px;
        font-size: 12px;
      }

      .logo-sub {
        display: none;
      }

      .main {
        padding: 16px;
      }

      .form-row,
      .form-row-3 {
        grid-template-columns: 1fr;
      }
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--green);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--green);
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Password Protection Overlay */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: scaleIn 0.3s ease;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .login-logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .login-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 2px;
    }

    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .login-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-dim);
      animation: shake 0.4s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      50% {
        transform: translateX(8px);
      }

      75% {
        transform: translateX(-4px);
      }
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.15s;
    }

    .login-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>

<body>

  <!-- Password Protection (rendered dynamically for i18n) -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-box">
      <div class="login-logo">🔬</div>
      <div class="login-title">Science Tube</div>
      <div class="login-subtitle" id="login-subtitle"></div>
      <form id="login-form" autocomplete="off">
        <input type="password" class="login-input" id="login-password" autofocus>
        <button type="submit" class="login-btn" id="login-btn"></button>
        <div class="login-error" id="login-error"></div>
      </form>
      <button class="lang-toggle" id="login-lang-toggle" style="margin-top:16px"></button>
    </div>
  </div>

  <div id="app" style="display:none"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>
    // ============================================================
    // Kreis der Exzellenz – YouTube Ad Script Generator
    // ============================================================

    // ============================================================
    // i18n — TRANSLATION SYSTEM
    // ============================================================

    function getLocale() { return localStorage.getItem('kde_locale') || 'de'; }
    function setLocale(loc) {
      localStorage.setItem('kde_locale', loc);
      document.documentElement.lang = loc;
      updateLoginI18n();
      render();
    }

    function t(key, vars) {
      const entry = I18N[key];
      if (!entry) return key;
      const loc = getLocale();
      let text = entry[loc] || entry['de'] || key;
      if (vars) {
        for (const [k, v] of Object.entries(vars)) {
          text = text.replace(new RegExp(`{{${k}}}`, 'g'), v);
        }
      }
      return text;
    }

    const I18N = {
      // --- Login ---
      'login.subtitle': { de: 'Zugang nur für autorisierte Nutzer', en: 'Authorized users only' },
      'login.placeholder': { de: 'Passwort eingeben', en: 'Enter password' },
      'login.button': { de: 'Zugang erhalten', en: 'Get access' },
      'login.error': { de: 'Falsches Passwort. Bitte erneut versuchen.', en: 'Wrong password. Please try again.' },

      // --- Navigation ---
      'nav.generate': { de: 'Skript generieren', en: 'Generate script' },
      'nav.output': { de: 'Aktuelles Skript', en: 'Current script' },
      'nav.archive': { de: 'Archiv', en: 'Archive' },
      'nav.thinkers': { de: 'Denker-Panel', en: 'Thinker Panel' },
      'nav.settings': { de: 'Einstellungen', en: 'Settings' },

      // --- API Status ---
      'api.connected': { de: 'Anthropic verbunden', en: 'Anthropic connected' },
      'api.disconnected': { de: 'Server nicht verbunden', en: 'Server not connected' },

      // --- Language Toggle ---
      'lang.switch_to_en': { de: '🇬🇧 English', en: '🇬🇧 English' },
      'lang.switch_to_de': { de: '🇩🇪 Deutsch', en: '🇩🇪 Deutsch' },

      // --- Generate Page ---
      'gen.title': { de: 'Skript generieren', en: 'Generate script' },
      'gen.subtitle': { de: 'Briefing ausfüllen → Denker wählen → Kreis debattieren lassen', en: 'Fill briefing → Select thinkers → Let the circle debate' },
      'gen.briefing': { de: 'Briefing', en: 'Briefing' },

    // ============================================================
    // Thinker description helper (bilingual)
    // ============================================================
    function getThinkerDesc(role) {
      const descs = {
        'Awareness-Stratege': { de: 'die richtige Awareness-Stufe bestimmen musst', en: 'you need to determine the right awareness level' },
        'Offer-Architekt': { de: 'den Offer optimieren und den wahrgenommenen Wert maximieren willst', en: 'you want to optimize the offer and maximize perceived value' },
        'Story-Architekt': { de: 'eine narrative Brücke und emotionale Verbindung brauchst', en: 'you need a narrative bridge and emotional connection' },
        'Qualitätswächter': { de: 'sicherstellen willst, dass jedes Wort auf Fakten basiert', en: 'you want to ensure every word is fact-based' },
        'Mechanism-Ingenieur': { de: 'erklären musst, WARUM dein Ansatz funktioniert', en: 'you need to explain WHY your approach works' },
        'Intensifier': { de: 'die emotionale Wirkung des Problems verstärken willst', en: 'you want to intensify the emotional impact of the problem' },
        'Aufmerksamkeits-Ingenieur': { de: 'einen unvergesslichen Hook brauchst', en: 'you need an unforgettable hook' },
        'Trust-Architekt': { de: 'Vertrauen aufbauen willst, bevor du verkaufst', en: 'you want to build trust before selling' },
        'Research-Master': { de: 'modulare, testbare Copy-Elemente brauchst', en: 'you need modular, testable copy elements' },
        'Visual Storytellers': { de: 'visuelle Demo-Konzepte für Video brauchst', en: 'you need visual demo concepts for video' },
        'ROI-Wächter': { de: 'messbare Ergebnisse und harte CTAs brauchst', en: 'you need measurable results and hard CTAs' },
        'Curiosity-Meister': { de: 'Neugier und Open Loops erzeugen willst', en: 'you want to create curiosity and open loops' },
      };
      const d = descs[role];
      if (!d) return '';
      const loc = getLocale();
      const prefix = loc === 'en' ? 'Select this thinker when ' : 'Wähle diesen Denker, wenn du ';
      const suffix = loc === 'en' ? '.' : '.';
      return prefix + (d[loc] || d['de']) + suffix;
    }

        // Collect full streaming response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let sseBuffer = '';
        let fullResponse = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          sseBuffer += decoder.decode(value, { stream: true });

          let eventBoundary;
          while ((eventBoundary = sseBuffer.indexOf('\n\n')) !== -1) {
            const eventBlock = sseBuffer.substring(0, eventBoundary);
            sseBuffer = sseBuffer.substring(eventBoundary + 2);

            for (const line of eventBlock.split('\n')) {
              const trimmed = line.trim();
              if (!trimmed.startsWith('data: ')) continue;
              const data = trimmed.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                  fullResponse += parsed.delta.text;
                }

            messages: [{ role: 'user', content: buildUserPrompt() }],
          }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
          throw new Error(err.error || `Server-Fehler: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let sseBuffer = '';
        let renderTimer = null;
        let pendingRender = false;

        // Throttled render: max ~12 updates/sec to prevent DOM thrashing
        function scheduleRender() {
          if (renderTimer) { pendingRender = true; return; }
          state.currentOutput = fullOutput;
          render();
          renderTimer = setTimeout(() => {
            renderTimer = null;
            if (pendingRender) { pendingRender = false; scheduleRender(); }
          }, 80);
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          sseBuffer += decoder.decode(value, { stream: true });

          // Process complete SSE events (separated by double-newline)
          let eventBoundary;
          while ((eventBoundary = sseBuffer.indexOf('\n\n')) !== -1) {
            const eventBlock = sseBuffer.substring(0, eventBoundary);
            sseBuffer = sseBuffer.substring(eventBoundary + 2);

            // Extract data lines from event block
            for (const line of eventBlock.split('\n')) {
              const trimmed = line.trim();
              if (!trimmed.startsWith('data: ')) continue;
              const data = trimmed.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                  fullOutput += parsed.delta.text;
                  scheduleRender();
                }
              } catch (e) { /* skip malformed JSON */ }
            }
          }
        }

        // Flush decoder
        const remaining = decoder.decode();
        if (remaining) sseBuffer += remaining;

        // Process any remaining buffered data
        if (sseBuffer.trim()) {
          for (const line of sseBuffer.split('\n')) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                fullOutput += parsed.delta.text;
              }
            } catch (e) { /* skip */ }
          }
        }

        // Cancel any pending throttled render
        if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }

        // Final definitive render with complete text
        state.currentOutput = fullOutput;

        clearInterval(phaseInterval);

        // Save to archive
        const title = fullOutput.match(/^#\s+(.+)$/m)?.[1] || `Skript ${new Date().toLocaleDateString('de-DE')}`;
        const archiveItem = {
          id: Date.now(),
          title,
          date: new Date().toISOString(),
          product: state.product,
          language: state.language,
          duration: state.duration,
          thinkers: [...state.selectedThinkers],
          frameworks: [...state.selectedFrameworks],
          content: fullOutput,
        };

        state.archive.unshift(archiveItem);
        localStorage.setItem('kde_archive', JSON.stringify(state.archive));

        setState({ isGenerating: false });
        showToast(t('toast.generated'));

      } catch (err) {
        clearInterval(phaseInterval);
        setState({ isGenerating: false, currentOutput: `${t('error.prefix')} ${err.message}\n\n${t('error.checkApi')}` });
      }
    }

    function formatScriptOutput(md) {
      // Convert markdown to HTML with section highlighting
      let html = marked.parse(md);

      // Wrap script sections in colored containers
      html = html.replace(/<h3>HOOK\s*\(([^)]+)\)<\/h3>/gi, '<div class="script-section hook"><div class="section-label">Hook ($1)</div>');
      html = html.replace(/<h3>ENGAGEMENT\s*\(([^)]+)\)<\/h3>/gi, '</div><div class="script-section engage"><div class="section-label">Engagement ($1)</div>');
      html = html.replace(/<h3>MECHANISM\s*\(([^)]+)\)<\/h3>/gi, '</div><div class="script-section mechanism"><div class="section-label">Mechanism ($1)</div>');
      html = html.replace(/<h3>PROOF\s*\(([^)]+)\)<\/h3>/gi, '</div><div class="script-section proof"><div class="section-label">Proof ($1)</div>');
      html = html.replace(/<h3>(CTA|EHRLICHKEITS-MOMENT)\s*\(([^)]+)\)<\/h3>/gi, '</div><div class="script-section cta"><div class="section-label">$1 ($2)</div>');

      // Close the last section before next h2
      html = html.replace(/<h2>A\/B/gi, '</div><h2>A/B');

      // Style audio lines
      html = html.replace(/<strong>Audio:<\/strong>\s*"([^"]+)"/g, '<strong>Audio:</strong> <span class="audio-line">"$1"</span>');
      html = html.replace(/<strong>Visuell:<\/strong>/g, '<span class="visual-note"><strong>Visuell:</strong></span>');

      return html;
    }

    function renderSettingsPage() {

        <strong style="color:var(--text)">3.</strong> ${t('settings.step3')} <code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-family:monospace">sk-ant-DEIN-KEY-HIER</code> ${t('settings.step3b')}<br>

    // ============================================================
    // EVENT BINDING
    // ============================================================

    function bindEvents() {
      // Navigation
      document.querySelectorAll('.nav-item[data-page]').forEach(el => {
        el.addEventListener('click', () => setState({ page: el.dataset.page }));
      });

      // Thinker selection (on generate page chips)
      document.querySelectorAll('.thinker-chip[data-thinker]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.thinker;
          const tk = getThinkersList().find(x => x.id === id);
          if (tk && tk.required) return;
          const sel = [...state.selectedThinkers];
          if (sel.includes(id)) sel.splice(sel.indexOf(id), 1);
          else sel.push(id);
          setState({ selectedThinkers: sel });
        });
      });

      // Thinker management – Add
      const btnAddThinker = document.getElementById('btn-add-thinker');
      if (btnAddThinker) btnAddThinker.addEventListener('click', () => {
        setState({ showAddThinkerForm: true });
      });

      // Thinker management – Cancel
      const btnCancelThinker = document.getElementById('btn-cancel-thinker');
      if (btnCancelThinker) btnCancelThinker.addEventListener('click', () => {
        setState({ showAddThinkerForm: false });
      });

      // Thinker management – Save
      const btnSaveThinker = document.getElementById('btn-save-thinker');
      if (btnSaveThinker) btnSaveThinker.addEventListener('click', () => {
        const name = document.getElementById('tf-name')?.value?.trim();
        const emoji = document.getElementById('tf-emoji')?.value?.trim() || '🧠';
        const roleDe = document.getElementById('tf-role-de')?.value?.trim();
        const roleEn = document.getElementById('tf-role-en')?.value?.trim();
        const descDe = document.getElementById('tf-desc-de')?.value?.trim();
        const descEn = document.getElementById('tf-desc-en')?.value?.trim();

        if (!name || !roleDe) {
          showToast(t('thinkers.form.error'));
          return;
        }

        const id = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_');

        // Prüfe ob ID schon existiert
        if (getThinkersList().some(tk => tk.id === id)) {
          showToast(t('thinkers.form.exists'));
          return;
        }

        const newThinker = {
          id,
          name,
          emoji,
          role: { de: roleDe, en: roleEn || roleDe },
          required: false,
          custom: true,
          description: { de: descDe || roleDe, en: descEn || roleEn || descDe || roleDe },
        };

        saveCustomThinker(newThinker);
        state.selectedThinkers.push(id);
        setState({ showAddThinkerForm: false });
        showToast(t('thinkers.form.saved', { name }));
      });

      // Thinker management – Remove
      document.querySelectorAll('.btn-remove-thinker[data-remove-thinker]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = el.dataset.removeThinker;
          const tk = getThinkersList().find(x => x.id === id);
          if (tk && confirm(t('thinkers.confirmRemove', { name: tk.name }))) {
            removeThinker(id);
            render();
            showToast(t('thinkers.removed', { name: tk.name }));
          }
        });
      });

      // Thinker management – Restore defaults
      const btnRestoreDefaults = document.getElementById('btn-restore-defaults');
      if (btnRestoreDefaults) btnRestoreDefaults.addEventListener('click', () => {
        restoreDefaultThinkers();
        render();
        showToast(t('thinkers.defaultsRestored'));
      });

      // Framework selection (on generate page chips)
      document.querySelectorAll('.framework-chip[data-framework]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.framework;
          const sel = [...state.selectedFrameworks];
          if (sel.includes(id)) sel.splice(sel.indexOf(id), 1);
          else sel.push(id);
          setState({ selectedFrameworks: sel });
        });
      });

      // Framework management – Add (show analyze + form)
      const btnAddFramework = document.getElementById('btn-add-framework');
      if (btnAddFramework) btnAddFramework.addEventListener('click', () => {
        setState({ showAnalyzeFramework: true, showAddFrameworkForm: true, frameworkAnalysis: null, isAnalyzingFramework: false });
      });

      // Framework management – Cancel analyze
      const btnCancelAnalyze = document.getElementById('btn-cancel-analyze');
      if (btnCancelAnalyze) btnCancelAnalyze.addEventListener('click', () => {
        setState({ showAnalyzeFramework: false, showAddFrameworkForm: false, frameworkAnalysis: null, isAnalyzingFramework: false });
      });

      // Framework management – Run analyze
      const btnRunAnalyze = document.getElementById('btn-run-analyze');
      if (btnRunAnalyze) btnRunAnalyze.addEventListener('click', () => {
        const script = document.getElementById('fw-analyze-script')?.value?.trim();
        if (!script) { showToast(t('fw.analyze.noScript')); return; }
        analyzeFramework(script);
      });

      // Framework management – Accept analysis
      const btnAcceptAnalysis = document.getElementById('btn-accept-analysis');
      if (btnAcceptAnalysis) btnAcceptAnalysis.addEventListener('click', () => {
        if (state.frameworkAnalysis?.extracted) {
          // Pre-fill form and show it
          setState({ showAddFrameworkForm: true, showAnalyzeFramework: false });
          showToast(t('fw.analyze.accepted'));
        }
      });

      // Framework management – Discard analysis
      const btnDiscardAnalysis = document.getElementById('btn-discard-analysis');
      if (btnDiscardAnalysis) btnDiscardAnalysis.addEventListener('click', () => {
        setState({ frameworkAnalysis: null });
      });

      // Framework management – Cancel form
      const btnCancelFramework = document.getElementById('btn-cancel-framework');
      if (btnCancelFramework) btnCancelFramework.addEventListener('click', () => {
        setState({ showAddFrameworkForm: false, showAnalyzeFramework: false, frameworkAnalysis: null });
      });

      // Framework management – Save
      const btnSaveFramework = document.getElementById('btn-save-framework');
      if (btnSaveFramework) btnSaveFramework.addEventListener('click', () => {
        const name = document.getElementById('ff-name')?.value?.trim();
        const useDe = document.getElementById('ff-use-de')?.value?.trim();
        const useEn = document.getElementById('ff-use-en')?.value?.trim();
        const descDe = document.getElementById('ff-desc-de')?.value?.trim();
        const descEn = document.getElementById('ff-desc-en')?.value?.trim();
        const score = parseInt(document.getElementById('ff-score')?.value) || 3;

        if (!name || !descDe) {
          showToast(t('fw.form.error'));
          return;
        }

        const id = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_');

        if (getFrameworksList().some(fw => fw.id === id)) {
          showToast(t('fw.form.exists'));
          return;
        }

        const newFramework = {
          id,
          name,
          emoji: state.frameworkAnalysis?.extracted?.emoji || '📐',
          use: { de: useDe || name, en: useEn || useDe || name },
          score,
          custom: true,
          description: { de: descDe, en: descEn || descDe },
        };

        saveCustomFramework(newFramework);
        state.selectedFrameworks.push(id);
        setState({ showAddFrameworkForm: false, showAnalyzeFramework: false, frameworkAnalysis: null });
        showToast(t('fw.form.saved', { name }));
      });

      // Framework management – Remove
      document.querySelectorAll('.btn-remove-framework[data-remove-framework]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = el.dataset.removeFramework;
          const fw = getFrameworksList().find(x => x.id === id);
          if (fw && confirm(t('fw.confirmRemove', { name: fw.name }))) {
            removeFramework(id);
            render();
            showToast(t('fw.removed', { name: fw.name }));
          }
        });
      });

      // Framework management – Restore defaults
      const btnRestoreFwDefaults = document.getElementById('btn-restore-fw-defaults');
      if (btnRestoreFwDefaults) btnRestoreFwDefaults.addEventListener('click', () => {
        restoreDefaultFrameworks();
        render();
        showToast(t('fw.defaultsRestored'));
      });

      // Form fields
      const bind = (id, key) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', () => { state[key] = el.value; });
      };

      bind('f-product', 'product');
      bind('f-language', 'language');
      bind('f-duration', 'duration');
      bind('f-productName', 'productName');
      bind('f-corePromise', 'corePromise');
      bind('f-uniqueMechanism', 'uniqueMechanism');
      bind('f-awareness', 'awareness');
      bind('f-tonality', 'tonality');
      bind('f-additionalContext', 'additionalContext');

      // Generate
      const btnGen = document.getElementById('btn-generate');
      if (btnGen) btnGen.addEventListener('click', generateScript);

      // Output tabs
      document.querySelectorAll('.output-tab[data-tab]').forEach(el => {
        el.addEventListener('click', () => setState({ outputTab: el.dataset.tab }));
      });

      // Copy
      const btnCopy = document.getElementById('btn-copy');
      if (btnCopy) btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(state.currentOutput);
        showToast(t('toast.copied'));
      });

      const btnCopyArchive = document.getElementById('btn-copy-archive');
      if (btnCopyArchive) btnCopyArchive.addEventListener('click', () => {
        navigator.clipboard.writeText(state.selectedArchiveItem.content);
        showToast(t('toast.copied'));
      });

      // Archive
      document.querySelectorAll('.archive-item[data-archive]').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('.btn-delete-archive')) return;
          const item = state.archive.find(x => x.id === parseInt(el.dataset.archive));
          setState({ selectedArchiveItem: item });
        });
      });

      document.querySelectorAll('.btn-delete-archive[data-delete]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(el.dataset.delete);
          state.archive = state.archive.filter(x => x.id !== id);
          localStorage.setItem('kde_archive', JSON.stringify(state.archive));
          render();
          showToast(t('toast.deleted'));
        });
      });

      const btnBackArchive = document.getElementById('btn-back-archive');
      if (btnBackArchive) btnBackArchive.addEventListener('click', () => setState({ selectedArchiveItem: null }));

      // Settings – Model selection
      const sModel = document.getElementById('s-model');
      if (sModel) sModel.addEventListener('change', () => {
        localStorage.setItem('kde_model', sModel.value);
        setState({ model: sModel.value });
        showToast(`${t('settings.model')}: ${sModel.value}`);
      });

      // Settings – Check connection
      const btnCheckConn = document.getElementById('btn-check-connection');
      if (btnCheckConn) btnCheckConn.addEventListener('click', checkServerConnection);

      // Settings – Clear archive
      const btnClearArchive = document.getElementById('btn-clear-archive');
      if (btnClearArchive) btnClearArchive.addEventListener('click', () => {
        if (confirm(t('confirm.clearArchive'))) {
          state.archive = [];
          localStorage.setItem('kde_archive', '[]');
          render();
          showToast(t('toast.archiveCleared'));
        }
      });

      // Language toggle
      const btnLangToggle = document.getElementById('btn-lang-toggle');
      if (btnLangToggle) btnLangToggle.addEventListener('click', () => {
        setLocale(getLocale() === 'de' ? 'en' : 'de');
      });
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ============================================================
    // SERVER CONNECTION CHECK
    // ============================================================
    async function checkServerConnection() {
      try {
        const res = await fetch('/api/status', { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          const data = await res.json();
          setState({ apiConnected: true });
          showToast(t('toast.serverConnected') + data.provider);
        } else {
          setState({ apiConnected: false });
        }
      } catch {
        setState({ apiConnected: false });
      }
    }

    // ============================================================
    // PASSWORD PROTECTION & LOGIN i18n
    // ============================================================
    const PASSWORD_HASH = '69ecaa44d7cc98f1ffccc5b2632a4225180993b717d8f1e71a811437d2fafc73';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function updateLoginI18n() {
      const sub = document.getElementById('login-subtitle');
      const pwd = document.getElementById('login-password');
      const btn = document.getElementById('login-btn');
      const langBtn = document.getElementById('login-lang-toggle');
      if (sub) sub.textContent = t('login.subtitle');
      if (pwd) pwd.placeholder = t('login.placeholder');
      if (btn) btn.textContent = t('login.button');
      if (langBtn) langBtn.textContent = getLocale() === 'de' ? t('lang.switch_to_en') : t('lang.switch_to_de');
    }

    function initApp() {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = '';
      document.documentElement.lang = getLocale();
      render();
      checkServerConnection();
      setInterval(checkServerConnection, 30000);
    }

    // Initialize login i18n
    updateLoginI18n();

    // Login-page language toggle
    document.getElementById('login-lang-toggle').addEventListener('click', () => {
      setLocale(getLocale() === 'de' ? 'en' : 'de');
    });

    // Check if already authenticated in this session
    if (sessionStorage.getItem('kde_auth') === 'true') {
      initApp();
    } else {
      document.getElementById('login-overlay').style.display = '';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('login-password');
      const errorEl = document.getElementById('login-error');
      const hash = await sha256(input.value);

      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem('kde_auth', 'true');
        document.getElementById('login-overlay').style.opacity = '0';
        document.getElementById('login-overlay').style.transition = 'opacity 0.3s ease';
        setTimeout(initApp, 300);
      } else {
        input.classList.add('error');
        errorEl.textContent = t('login.error');
        setTimeout(() => input.classList.remove('error'), 500);
        input.value = '';
        input.focus();
      }
    });
  </script>
